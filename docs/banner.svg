<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="320" viewBox="0 0 1200 320" font-family="'Segoe UI',Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#a3e635"/>
    </linearGradient>
    <radialGradient id="glowLime" cx="85%" cy="-10%" r="70%">
      <stop offset="0%" stop-color="#a3e635" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#a3e635" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowMag" cx="4%" cy="0%" r="55%">
      <stop offset="0%" stop-color="#e879f9" stop-opacity="0.12"/>
      <stop offset="60%" stop-color="#e879f9" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#ffffff" fill-opacity="0.03"/>
    </pattern>
  </defs>

  <rect width="1200" height="320" fill="#0e0f13"/>
  <rect width="1200" height="320" fill="url(#dots)"/>
  <rect width="1200" height="320" fill="url(#glowLime)"/>
  <rect width="1200" height="320" fill="url(#glowMag)"/>

  <!-- accent mark -->
  <g transform="translate(96,116)">
    <rect x="0" y="0" width="88" height="88" rx="22" fill="#16181d" stroke="#262a33"/>
    <circle cx="44" cy="44" r="20" fill="none" stroke="#a3e635" stroke-width="6"/>
    <circle cx="44" cy="44" r="5" fill="#e879f9"/>
  </g>

  <text x="232" y="158" font-size="62" font-weight="800" fill="url(#title)" letter-spacing="-1.5">technitium-console</text>
  <text x="234" y="206" font-size="26" font-weight="500" fill="#a3acba">A modern, fast web UI for Technitium DNS Server</text>
  <text x="234" y="244" font-size="17" font-weight="500" fill="#6b7585" font-family="'JetBrains Mono',ui-monospace,monospace">React · TypeScript · Tailwind · MIT</text>
</svg>
